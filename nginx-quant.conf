server {
    listen 80;
    server_name lh.mozengfu.com.cn;

    # ---------- 字符集 ----------
    charset utf-8;

    # ---------- 安全头 ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 日志 ----------
    access_log /var/log/nginx/quant-access.log;
    error_log  /var/log/nginx/quant-error.log;

    # ---------- 前端 SPA ----------
    location / {
        proxy_pass http://192.168.10.30:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie 透传（JWT 认证需要）
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # ---------- 资产（缓存优化） ----------
    location /assets/ {
        proxy_pass http://192.168.10.30:5001/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- 只读 API 白名单 ----------
    location ~ ^/api/(pipeline/status|trading/positions|trading/balance|trading/trades|recommend/v11|scanner/signals)$ {
        proxy_pass http://192.168.10.30:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # ---------- 认证/登录 ----------
    location ~ ^/(login|register|api/auth/) {
        proxy_pass http://192.168.10.30:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # ---------- 静态资源（favicon） ----------
    location /static/ {
        proxy_pass http://192.168.10.30:5001/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
    }

    # ---------- 拒绝所有其他 API 请求 ----------
    location /api/ {
        deny all;
        return 403;
    }

    # ---------- 拒绝敏感路径 ----------
    location ~ \.(env|git|svn|htaccess|DS_Store|sql|bak|swp|log)$ {
        deny all;
        return 404;
    }
}
