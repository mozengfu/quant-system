<!DOCTYPE html>
<html lang=zh-CN>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width, initial-scale=1.0>
    <title>管理员后台 - 智能量化选股系统</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a2332; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; color: #ffffff; font-weight: 600; }
        .header .user { color: rgba(255,255,255,0.9); font-size: 14px; }
        .main { padding: 24px 30px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { font-size: 18px; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #667eea; }
        .empty { color: #888; text-align: center; padding: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #f8f9fa; color: #555; font-weight: 500; font-size: 13px; }
        td { font-size: 14px; }
        .btn { padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn-approve { background: #4caf50; color: white; }
        .btn-approve:hover { background: #45a049; }
        .btn-reject { background: #f44336; color: white; margin-left: 8px; }
        .btn-reject:hover { background: #da190b; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .login-tip { text-align: center; padding: 40px; color: #888; }
        .login-tip a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 管理员后台</h1>
        <div style="display:flex;align-items:center;gap:16px">
            <a href="/" style="color:rgba(255,255,255,0.7); text-decoration:none; font-size:13px;">← 首页</a>
            <a href="/log_analytics" style="color:white;text-decoration:none;font-size:14px;">📊 访问分析</a>
            <div class="user">管理员</div>
        </div>
    </div>

    <div class="main">
        <div id="message" class="message"></div>

        <div class="card">
            <h2>待审核用户</h2>
            <div id="pendingList">加载中...</div>
        </div>

        <div class="card">
            <h2>已激活用户</h2>
            <div id="userList">加载中...</div>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            if (typeof str !== 'string') return str;
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        async function loadPending(){
            try{
                const res = await fetch('/api/admin/pending', {
                    credentials: 'same-origin',
                    headers: {'Content-Type': 'application/json'}
                });

                // 先检查是否 403
                if(res.status === 403){
                    document.getElementById('pendingList').innerHTML = '<div class="login-tip">请先<a href="/login">登录管理员账号</a></div>';
                    return;
                }

                const data = await res.json();

                if(!res.ok){
                    document.getElementById('pendingList').innerHTML = '<div class="empty">加载失败：' + escapeHtml(data.detail) + '</div>';
                    return;
                }

                const pending = data.pending || {};
                if(Object.keys(pending).length === 0){
                    document.getElementById('pendingList').innerHTML = '<div class="empty">暂无待审核用户</div>';
                    return;
                }

                let html = '<table><tr><th>用户名</th><th>邮箱</th><th>套餐</th><th>金额</th><th>付款备注</th><th>注册时间</th><th>操作</th></tr>';
                for(const [username, info] of Object.entries(pending)){
                    const planType = info.plan_type === 'trial' ? '🎁 试用 1 天' : '📦 包年';
                    const amount = info.pay_amount || 99;
                    const safeUsername = escapeHtml(username);
                    const safePlanType = escapeHtml(info.plan_type || 'annual');
                    const safeEmail = escapeHtml(info.email || '-');
                    const safeAmount = escapeHtml(amount);
                    const safePayRemark = escapeHtml(info.pay_remark || '-');
                    const safeRegisterTime = escapeHtml(info.register_time || '-');
                    html += '<tr><td>' + safeUsername + '</td><td>' + safeEmail + '</td><td>' + planType + '</td><td>¥' + safeAmount + '</td><td>' + safePayRemark + '</td><td>' + safeRegisterTime + '</td><td><button class="btn btn-approve" data-username="' + safeUsername + '" data-plantype="' + safePlanType + '">通过</button></td></tr>';
                }
                html += '</table>';
                document.getElementById('pendingList').innerHTML = html;
            } catch(e){
                console.error('加载待审核用户失败:', e);
                document.getElementById('pendingList').innerHTML = '<div class="empty">加载失败：' + escapeHtml(e.message) + '</div>';
            }
        }

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.btn-approve');
            if (btn && btn.dataset.username) {
                approveUser(btn.dataset.username, btn.dataset.plantype);
            }
        });

        async function approveUser(username, planType = 'annual'){
            // 让用户选择开通时长
            const duration = prompt('请选择开通时长（天）：\n包年会员输入 365\n试用套餐输入 1\n或自定义天数', planType === 'trial' ? '1' : '365');
            if (!duration || isNaN(duration)) {
                showMessage('取消审核', 'error');
                return;
            }
            if(!confirm('确定审核通过 ' + username + ' 吗？\n开通时长：' + duration + ' 天')) return;
            try{
                const res = await fetch('/api/admin/approve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, duration: parseInt(duration)}),
                    credentials: 'same-origin'
                });

                if(res.ok){
                    showMessage('审核通过！通知已发送', 'success');
                    setTimeout(() => {
                        loadPending();
                        loadUsers();
                    }, 1000);
                } else if(res.status === 403){
                    showMessage('请先登录管理员账号', 'error');
                } else {
                    const data = await res.json();
                    showMessage('审核失败：' + (data.detail || '未知错误'), 'error');
                }
            } catch(e){
                showMessage('请求失败：' + e.message, 'error');
            }
        }

        async function loadUsers(){
            try{
                const res = await fetch('/api/admin/users', {
                    credentials: 'same-origin',
                    headers: {'Content-Type': 'application/json'}
                });

                if(res.status === 403){
                    document.getElementById('userList').innerHTML = '<div class="login-tip">请先<a href="/login">登录管理员账号</a></div>';
                    return;
                }

                const data = await res.json();

                if(!res.ok){
                    document.getElementById('userList').innerHTML = '<div class="empty">加载失败</div>';
                    return;
                }

                const users = data.users || {};
                let html = '<table><tr><th>用户名</th><th>邮箱</th><th>注册时间</th><th>帐号状态</th><th>到期还剩</th></tr>';
                for(const [username, info] of Object.entries(users)){
                    // 主账号是字符串（密码哈希），其他用户是字典
                    const isMainAccount = typeof info === 'string';
                    const email = isMainAccount ? '-' : (info.email || '-');
                    const registerTime = isMainAccount ? '-' : (info.register_time || '-');

                    // 计算到期状态和剩余天数
                    let status = '<span style="color:#888">-</span>';
                    let daysLeft = '-';
                    if(!isMainAccount && info.expire_date){
                        const expireDate = new Date(info.expire_date);
                        const now = new Date();
                        const diffTime = expireDate - now;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        if(diffDays > 30){
                            status = '<span style="color:#4caf50">✅ 正常</span>';
                        } else if(diffDays > 7){
                            status = '<span style="color:#ff9800">⚠️ 即将到期</span>';
                        } else if(diffDays > 0){
                            status = '<span style="color:#ff5722">⚡ 即将过期</span>';
                        } else {
                            status = '<span style="color:#f44336">❌ 已过期</span>';
                        }
                        daysLeft = diffDays > 0 ? diffDays + ' 天' : '已过期';
                    } else if (isMainAccount) {
                        // 主账号永久有效
                        status = '<span style="color:#4caf50">👑 永久</span>';
                        daysLeft = '永久';
                    }

                    html += '<tr><td>' + escapeHtml(username) + '</td><td>' + escapeHtml(email) + '</td><td>' + escapeHtml(registerTime) + '</td><td>' + status + '</td><td>' + daysLeft + '</td></tr>';
                }
                html += '</table>';
                document.getElementById('userList').innerHTML = html;
            } catch(e){
                console.error('加载用户失败:', e);
                document.getElementById('userList').innerHTML = '<div class="empty">加载失败：' + escapeHtml(e.message) + '</div>';
            }
        }

        function showMessage(msg, type){
            const d = document.getElementById('message');
            d.textContent = msg;
            d.className = 'message ' + type;
            setTimeout(() => d.className = 'message', 3000);
        }

        // 页面加载时执行
        loadPending();
        loadUsers();
    </script>
</body>
</html>
